name: chalk
description: "Chalk MCP Server — CI/CD setup, Docker build provenance, SBOM, supply chain security by Crash Override"
icon_url: https://chalkproject.io/favicon.ico
ref: ghcr.io/crashappsec/co/chalk-mcp-server:latest
config_schema: {}
container:
  image: ghcr.io/crashappsec/co/chalk-mcp-server:latest
  mounts:
    - source: /var/run/docker.sock
      target: /var/run/docker.sock
    - source: /tmp
      target: /tmp
    - source: /private/tmp
      target: /private/tmp
    - source: /Users
      target: /Users
  environment:
    CHALK_CONFIG_DIR: __CONFIG_DIR__
